# Live systemd drop-in synced from VPS3 production.
# Root-cause fix on 2026-04-26: stop forcing degenerate 1-shard/64-token validation.
# Keep 5 validation shards and 128-token windows so remote scoring can observe real loss deltas.
[Service]
Environment=ALICE_VALIDATION_SEQ_LEN=128
Environment=ALICE_VALIDATION_BATCHES_PER_SHARD=1
Environment=ALICE_VALIDATION_MICROBATCH_SIZE=4
TimeoutStopSec=90
ExecStart=
ExecStart=/root/alice-scorer/.venv/bin/python3 /root/alice-scorer/scoring_server.py --model-path /root/alice-scorer/models/current_full.pt --validation-dir /root/alice-scorer/data/validation --host 0.0.0.0 --port 8090 --device cpu --num-val-shards 5 --ps-url https://ps.aliceprotocol.org --model-dtype float16 --scorer-address a2u2hBW7G5EvjsbGYzXFnU3FTDGWK9W56LAx8h97Uy4sB84xV --public-endpoint http://65.108.226.112:8090
